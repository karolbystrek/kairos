services:
  postgres:
    image: postgres:18-alpine
    container_name: kairos-postgres
    environment:
      POSTGRES_USER: kairos-user
      POSTGRES_PASSWORD: kairos-password
      POSTGRES_DB: kairos-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: kairos-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

volumes:
  pgdata:
  redisdata: