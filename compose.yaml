services:
  postgres:
    image: postgres:18-alpine
    container_name: kairos-postgres
    environment:
      POSTGRES_USER: kairos-user
      POSTGRES_PASSWORD: kairos-password
      POSTGRES_DB: kairos-db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    restart: unless-stopped

  redis:
    image: redis:8-alpine
    container_name: kairos-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    restart: unless-stopped

  client-app:
    build:
      context: ./apps/client-app
      dockerfile: Dockerfile
    container_name: kairos-client-app
    expose:
      - "3000"
    restart: unless-stopped

  staff-app:
    build:
      context: ./apps/staff-app
      dockerfile: Dockerfile
    container_name: kairos-staff-app
    expose:
      - "3000"
    restart: unless-stopped

  caddy:
    image: caddy:2-alpine
    container_name: kairos-caddy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - client-app
      - staff-app
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
  caddy_data:
  caddy_config: